# Prefix: C-Space
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Shift Alt vim keys to switch windows
bind -n M-H previous-window
bind -n M-L next-window

# Start windows and panes at 1, not 0
set -g base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on
set-option -g status-position top

# set vi-mode
set-window-option -g mode-keys vi

# keybindings
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "wl-copy 2>/dev/null || xclip -selection clipboard -i 2>/dev/null"

# Open panes in current directory
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# True-color support
set -ga terminal-overrides ",*256col*:Tc"

# Tokyo night theme
set -g @plugin 'tkaretsos/tokyo-night-tmux'
set -g @tokyo-night-tmux_theme 'moon'
set -g @tokyo-night-tmux_window_id_style 'none'
set -g @tokyo-night-tmux_pane_id_style 'none'
set -g @tokyo-night-tmux_zoom_id_style 'none'
set -g @tokyo-night-tmux_show_datetime 1
set -g @tokyo-night-tmux_show_system_monitor 1
set -g @tokyo-night-tmux_date_format hide
set -g @tokyo-night-tmux_time_format 24H

# other plugins
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'

# TPM
set -g @plugin 'tmux-plugins/tpm'
run '~/.tmux/plugins/tpm/tpm'
